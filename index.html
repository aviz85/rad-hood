<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>כיפה אדומה והזאב הצמחוני — קווסט</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="game">
  <div id="statusbar"><span id="st-name"></span><span id="st-score"></span></div>
  <div id="screenwrap">
    <canvas id="screen" width="320" height="200"></canvas>
    <div id="msgbox" class="hidden">
      <div id="msgname"></div>
      <div id="msgtext"></div>
      <div id="msghint">לחצו או ENTER להמשך</div>
    </div>
    <div id="deathbox" class="hidden">
      <div id="deathtitle">נחה על משכבה בשלום</div>
      <div id="deathtext"></div>
      <div class="btns">
        <button id="btn-restore">שחזור</button>
        <button id="btn-restart">מההתחלה</button>
      </div>
    </div>
    <div id="titlebox">
      <h1 id="title-h1"></h1>
      <h2 id="title-h2"></h2>
      <button id="btn-start">התחלת ההרפתקה</button>
      <button id="btn-load">טעינת משחק שמור</button>
      <p class="cr">בהשראת משחקי Sierra On-Line · נכתב כולו ע"י צי של 70 סוכני AI · כל הזכויות לא שמורות</p>
    </div>
  </div>
  <div id="invbar"><span id="inv-label">בתיק:</span><span id="inv-items"></span></div>
  <div id="suggest"></div>
  <div id="inputbar"><span id="prompt">&gt;</span><input id="cmd" autocomplete="off" placeholder="מה לעשות? (הבט / קח / דבר עם / השתמש ב... על...)"></div>
</div>

<!-- מנוע -->
